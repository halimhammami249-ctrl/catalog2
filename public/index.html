<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Catalog System</title>
    <style>
      body {
        font-family: Arial;
        margin: 20px;
        background: #f5f5f5;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 15px;
      }

      .card {
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .card img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 8px;
      }

      .price {
        color: green;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Product Catalog</h1>

    <div class="grid" id="products"></div>

    <script>
      fetch('./products.json')
        .then((res) => res.json())
        .then((data) => {
          const container = document.getElementById('products');

          data.forEach((p) => {
            container.innerHTML += `
        <div class="card">
          <img src="${p.image}" />
          <h3>${p.name}</h3>
          <p class="price">${p.price} $</p>
          <p>${p.description}</p>
        </div>
      `;
          });
        });
    </script>
  </body>
</html>
